{% load static %}
<!-- Reusable header navigation shown across pages -->
<div class="topbar-inner">
        <a href="{% url 'checkins:dashboard' %}" class="brand" aria-label="Wellbeing Check-ins home">
          <img
            src="{% static 'checkins/images/logo.png' %}"
            alt="Wellbeing Check-ins logo"
            class="brand-logo"
          >
        </a>

        <div class="header-actions">
          <div class="user-nav">
            {% if user.is_authenticated %}
              <span class="username">{{ user.username }}</span>
              <a href="{% url 'logout' %}">Logout</a>
            {% else %}
              <a href="{% url 'login' %}"
                {% if request.resolver_match.url_name == "login" %}aria-current="page"{% endif %}>
                Login
              </a>
              <a href="{% url 'register' %}"
                {% if request.resolver_match.url_name == "register" %}aria-current="page"{% endif %}>
                Register
              </a>
            {% endif %}
          </div>

          <button class="nav-toggle" id="navToggle" type="button"
            aria-label="Toggle navigation" aria-controls="mobileMenu" aria-expanded="false">
            <span></span>
            <span></span>
            <span></span>
          </button>

          <nav class="main-nav" aria-label="Main navigation">
            <a href="{% url 'checkins:dashboard' %}"
              {% if request.resolver_match.url_name == "dashboard" %}aria-current="page"{% endif %}>
              Dashboard
            </a>
            <a href="{% url 'checkins:checkin_list' %}"
              {% if request.resolver_match.url_name == "checkin_list" %}aria-current="page"{% endif %}>
              Check-ins
            </a>
            <a href="{% url 'checkins:progress' %}"
              {% if request.resolver_match.url_name == "progress" %}aria-current="page"{% endif %}>
              Progress
            </a>
            <a href="{% url 'checkins:goal_list' %}"
              {% if request.resolver_match.url_name == "goal_list" %}aria-current="page"{% endif %}>
              Goals
            </a>
            <a href="{% url 'checkins:habit_list' %}"
              {% if request.resolver_match.url_name == "habit_list" %}aria-current="page"{% endif %}>
              Habits
            </a>
            <a href="{% url 'checkins:checkin_create' %}"
              {% if request.resolver_match.url_name == "checkin_create" %}aria-current="page"{% endif %}>
              New Check-in
            </a>
          </nav>
        </div>
      </div>
      <!-- Mobile navigation menu toggled with base.js -->
      <div class="mobile-menu" id="mobileMenu">
        <nav class="mobile-menu-links" aria-label="Mobile navigation">
          <a href="{% url 'checkins:dashboard' %}"
            {% if request.resolver_match.url_name == "dashboard" %}aria-current="page"{% endif %}>
            Dashboard
          </a>
          <a href="{% url 'checkins:checkin_list' %}"
            {% if request.resolver_match.url_name == "checkin_list" %}aria-current="page"{% endif %}>
            Check-ins
          </a>
          <a href="{% url 'checkins:progress' %}"
            {% if request.resolver_match.url_name == "progress" %}aria-current="page"{% endif %}>
            Progress
          </a>
          <a href="{% url 'checkins:goal_list' %}"
            {% if request.resolver_match.url_name == "goal_list" %}aria-current="page"{% endif %}>
            Goals
          </a>
          <a href="{% url 'checkins:habit_list' %}"
            {% if request.resolver_match.url_name == "habit_list" %}aria-current="page"{% endif %}>
            Habits
          </a>
          <a href="{% url 'checkins:checkin_create' %}"
            {% if request.resolver_match.url_name == "checkin_create" %}aria-current="page"{% endif %}>
            New Check-in
          </a>
        </nav>
      </div>
