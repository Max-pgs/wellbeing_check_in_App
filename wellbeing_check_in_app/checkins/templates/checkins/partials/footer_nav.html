{% load static %}
<!-- Reusable footer navigation shown across authenticated pages -->
<div class="footer-inner">

  <a href="{% url 'checkins:dashboard' %}" class="brand" aria-label="Wellbeing Check-ins home">
    <img
      src="{% static 'checkins/images/logo.png' %}"
      alt="Wellbeing Check-ins logo"
      class="brand-logo"
    >
  </a>

  <div class="header-actions">

    <nav class="main-nav footer-main-nav" aria-label="Footer navigation">
      <a href="{% url 'checkins:dashboard' %}">Dashboard</a>
      <a href="{% url 'checkins:checkin_list' %}">Check-ins</a>
      <a href="{% url 'checkins:progress' %}">Progress</a>
      <a href="{% url 'checkins:goal_list' %}">Goals</a>
      <a href="{% url 'checkins:habit_list' %}">Habits</a>
      <a href="{% url 'checkins:checkin_create' %}">New Check-in</a>
    </nav>

    <div class="user-nav">
      {% if user.is_authenticated %}
        <span class="username">{{ user.username }}</span>
        <a href="{% url 'logout' %}">Logout</a>
      {% endif %}
    </div>

  </div>

</div>

<p class="footer-copy">
  &copy; 2026 Wellbeing Check-ins App
</p>
