{% extends "checkins/base.html" %}
{% load static %}

{% block title %}Progress{% endblock %}

{% block content %}
<h1>Progress</h1>

<form id="progress-form">
  <label for="from-date">From</label>
  <input id="from-date" name="from" type="date" />

  <label for="to-date">To</label>
  <input id="to-date" name="to" type="date" />

  <button type="submit" id="calcBtn">Calculate</button>
</form>

<hr />

<section aria-live="polite" id="progress-result" style="margin-top: 1rem;"></section>

<div style="width: 900px; max-width: 100%; height: 320px; margin-top: 20px;">
  <canvas id="energyChart"></canvas>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="{% static 'checkins/js/progress.js' %}?v=2"></script>
{% endblock %}
