{% extends "checkins/base.html" %}
{% load static %}

{% block title %}My Check-ins{% endblock %}

{% block content %}
<h1>My Check-ins</h1>

<table id="history-table" border="1" cellpadding="6" cellspacing="0">
  <thead>
    <tr>
      <th>Date</th>
      <th>Energy</th>
      <th>Mood</th>
      <th>Activity</th>
    </tr>
  </thead>
  <tbody id="history-tbody">
    <tr><td colspan="4">Loading...</td></tr>
  </tbody>
</table>
{% endblock %}

{% block scripts %}
<script src="{% static 'checkins/js/history.js' %}?v=1"></script>
{% endblock %}
