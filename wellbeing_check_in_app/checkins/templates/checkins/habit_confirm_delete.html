{% extends "checkins/base.html" %}

{% block title %}Delete Habit{% endblock %}

{% block content %}
<section>
  <h1>Delete Habit</h1>
  <p>Are you sure you want to delete "{{ habit.title }}"?</p>

  <form method="post">
    {% csrf_token %}
    <button type="submit">Confirm delete</button>
  </form>

  <p>
    <a href="{% url 'checkins:habit_list' %}">Cancel</a>
  </p>
</section>
{% endblock %}
